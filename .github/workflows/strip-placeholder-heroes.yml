name: strip-placeholder-heroes
on: workflow_dispatch
permissions:
  contents: write
jobs:
  strip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show source context around ba block (debug)
        run: |
          grep -o '.\{0,120\}class="ba".\{0,260\}' cosmetics-retouching/index.html || echo "NO ba FOUND"
      - name: Strip placeholder hero images from landing pages
        run: |
          find . -name index.html -print0 | xargs -0 perl -0pi -e 's{<div>\s*<div class="ba"[^>]*>\s*<img[^>]*>\s*<span class="tag a">After</span>\s*</div>\s*</div>}{}g'
          echo "remaining ba occurrences in cosmetics page:"
          grep -c 'class="ba"' cosmetics-retouching/index.html || echo "0 - removed OK"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Remove placeholder hero images from niche landing pages (HTML)"
          git push
